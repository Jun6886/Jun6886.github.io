<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animasi Berputar Biru Cerah</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
        }

        /* Container utama */
        .container {
            position: relative;
            width: 300px;
            height: 300px;
            background-color: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
 .background-frame-1 {
        position: absolute;
        top: -25px;
        left: -25px;
        width: 250px;
        height: 250px;
        border: 5px dashed red;
        border-radius: 50%;
        box-sizing: border-box;
        animation: rotate-bg1 10s linear infinite reverse;
    }

    /* Bingkai latar belakang lapis kedua */
    .background-frame-2 {
        position: absolute;
        top: -40px;
        left: -40px;
        width: 280px;
        height: 280px;
        border: 5px dotted #8e44ad;
        border-radius: 50%;
        box-sizing: border-box;
        animation: rotate-bg2 12s linear infinite;
    }

    /* Bingkai profil utama berputar */
    .container::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: 5px solid red;
        border-radius: 50%;
        box-sizing: border-box;
        animation: rotate 60s linear infinite;
    }

    /* Gambar profil */
    .profile-pic {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        overflow: hidden;
        position: relative;
        z-index: 1;
    }

    .profile-pic img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
        /* Gambar di tengah */
        .profile-image {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            z-index: 1;
        }

        /* Lingkaran berputar */
        .circles {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: rotateCircles 12s linear infinite;
        }

        .circle {
            position: absolute;
            width: 30px;
            height: 30px;
            background: linear-gradient(to bottom, cyan,blue,red,gold);/* Biru cerah */
            border-radius: 50%;
            animation: pulse 2s infinite alternate;
        }

        /* Animasi lingkaran berputar */
        @keyframes rotateCircles {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Animasi pulse (memperbesar dan mengecil) */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.5); opacity: 1; }
        }

        /* Membuat posisi acak untuk lingkaran */
        .circle:nth-child(1) { top: 20%; left: 50%; animation-duration: 14s; }
        .circle:nth-child(2) { top: 30%; left: 20%; animation-duration: 15s; }
        .circle:nth-child(3) { top: 40%; left: 70%; animation-duration: 13s; }
        .circle:nth-child(4) { top: 50%; left: 10%; animation-duration: 16s; }
        .circle:nth-child(5) { top: 60%; left: 80%; animation-duration: 12s; }
        .circle:nth-child(6) { top: 70%; left: 40%; animation-duration: 18s; }
        .circle:nth-child(7) { top: 80%; left: 60%; animation-duration: 17s; }
        .circle:nth-child(8) { top: 20%; left: 20%; animation-duration: 20s; }
        .circle:nth-child(9) { top: 50%; left: 50%; animation-duration: 15s; }
        .circle:nth-child(10) { top: 40%; left: 10%; animation-duration: 19s; }
        
    </style>
</head>
<body>

<div class="container">
    <!-- Lingkaran berputar -->
    <div class="circles">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    <!-- Gambar Profil -->
    <img src="bil.jpeg" alt="Profil" class="profile-image">
</div>

</body>
</html>
